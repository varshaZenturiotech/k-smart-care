services:
  mongodb:
    image: mongo:7.0
    container_name: ksmart_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-adminpassword}
    volumes:
      - mongodb_data:/data/db
    networks:
      - ksmart_network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand({ ping: 1 })' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    container_name: ksmart_chromadb
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    networks:
      - ksmart_network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ksmart_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-adminpassword}@mongodb:27017/ksmart_care?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_string_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VLLM_URL: ${VLLM_URL}
      OLLAMA_URL: ${OLLAMA_URL}
      CHROMA_URL: http://chromadb:8000
      CHROMA_COLLECTION: ksmart_circulars
      CLIENT_ORIGIN: http://localhost:80
      EMBEDDING_MODEL: Xenova/paraphrase-multilingual-MiniLM-L12-v2
    volumes:
      - circular_uploads:/app/uploads
      - embedding_cache:/root/.cache
    networks:
      - ksmart_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ksmart_frontend
    restart: unless-stopped
    networks:
      - ksmart_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:stable-alpine
    container_name: ksmart_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/ro/default.conf
      # Mount default conf to Nginx default conf dir
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ksmart_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  ksmart_network:
    driver: bridge

volumes:
  mongodb_data:
  chroma_data:
  circular_uploads:
  embedding_cache:
